<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Login | Speeki Checklists - Team Review</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --speeki-green: #00FF7F;
            --speeki-green-text: #00875a;
            --speeki-dark-blue: #0a1f44;
            --speeki-dark: #0a1f44;
            --speeki-gray: #4a5568;
            --speeki-light-gray: #f8f9fa;
            --speeki-border: #e5e7eb;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
            background: linear-gradient(135deg, var(--speeki-dark-blue) 0%, #142d5c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 48px;
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo img {
            height: 50px;
            width: auto;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: var(--speeki-dark);
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--speeki-green-text);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--speeki-dark);
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--speeki-gray);
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--speeki-dark);
            margin-bottom: 8px;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            font-family: inherit;
            border: 2px solid var(--speeki-border);
            border-radius: 8px;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="password"]:focus {
            border-color: var(--speeki-green);
            box-shadow: 0 0 0 3px rgba(0, 255, 127, 0.15);
        }

        input[type="password"].error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
        }

        .error-message {
            color: #ef4444;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        button {
            width: 100%;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            background: var(--speeki-dark-blue);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #0d2a56;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .accent-bar {
            width: 60px;
            height: 4px;
            background: var(--speeki-green);
            margin: 0 auto 24px;
            border-radius: 2px;
        }

        .review-notice {
            background: var(--speeki-light-gray);
            border-radius: 8px;
            padding: 16px;
            margin-top: 24px;
            text-align: center;
        }

        .review-notice p {
            font-size: 13px;
            color: var(--speeki-gray);
        }

        .review-notice strong {
            color: var(--speeki-dark);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
            }
        }
            /* Skip Navigation Link */
        .skip-link { position: absolute; top: -40px; left: 0; background: #0a1f44; color: #fff; padding: 8px 16px; z-index: 10000; font-size: 14px; }
        .skip-link:focus { top: 0; }
        </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="login-container" id="main-content">
        <div class="logo">
            <div class="logo-text">Speeki<span>.</span></div>
        </div>

        <div class="accent-bar"></div>

        <h1>Team Review Access</h1>
        <p class="subtitle">Enter the password to access the checklists</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
                <p class="error-message" id="errorMessage">Incorrect password. Please try again.</p>
            </div>

            <button type="submit" id="submitBtn">Access Checklists</button>
        </form>

        <div class="review-notice">
            <p><strong>Internal Review Only</strong><br>This site is currently in review mode for team access.</p>
        </div>
    </div>

    <!-- Skip auth protection on login page -->
    <script>window.SPEEKI_AUTH_SKIP = true;</script>
    <script src="assets/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('loginForm');
            const passwordInput = document.getElementById('password');
            const errorMessage = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');

            // Get redirect URL from query params
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirect') || 'index.html';

            // Check if already authenticated
            if (SpeekiAuth.isAuthenticated()) {
                window.location.href = redirectUrl;
                return;
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const password = passwordInput.value;
                submitBtn.disabled = true;
                submitBtn.textContent = 'Verifying...';

                // Small delay for UX
                setTimeout(function() {
                    if (SpeekiAuth.login(password)) {
                        window.location.href = redirectUrl;
                    } else {
                        passwordInput.classList.add('error');
                        errorMessage.classList.add('visible');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Access Checklists';
                        passwordInput.focus();
                        passwordInput.select();
                    }
                }, 300);
            });

            // Clear error on input
            passwordInput.addEventListener('input', function() {
                passwordInput.classList.remove('error');
                errorMessage.classList.remove('visible');
            });
        });
    </script>
</body>
</html>
